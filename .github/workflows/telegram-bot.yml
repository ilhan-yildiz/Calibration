name: Telegram Bot Handler

on:
  repository_dispatch:
    types: [telegram-message]

jobs:
  handle-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run bot
        run: |
          python bot.py "${{ github.event.client_payload.chat_id }}" "${{ github.event.client_payload.message }}" "${{ secrets.TELEGRAM_BOT_TOKEN }}"
